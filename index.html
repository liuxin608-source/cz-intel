<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小孔电台 · 彩子专属频道</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000408;
      --bg: #010a12;
      --bg-card: #030d18;
      --bg-card-hover: #061524;
      --blue: #1a6fa8;
      --blue-bright: #2d9fd8;
      --blue-glow: rgba(45, 159, 216, 0.1);
      --border: rgba(26, 111, 168, 0.18);
      --border-hover: rgba(45, 159, 216, 0.4);
      --text: #c8dae8;
      --text-dim: #5a7a94;
      --text-muted: #2a4a62;
      --signal: #2d9fd8;
      --oddity: #7b68ee;
      --frame: #4db89a;
      --picks: #c8956c;
      --font: 'Space Grotesk', system-ui, sans-serif;
      --mono: 'Space Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #starCanvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; opacity: 0.7;
    }

    .scanline {
      position: fixed; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-bright), transparent);
      opacity: 0.35; z-index: 100;
      animation: scan 10s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: 0; opacity: 0; }
      5%   { opacity: 0.35; }
      95%  { opacity: 0.35; }
      100% { top: 100vh; opacity: 0; }
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 720px; margin: 0 auto;
      padding: 3rem 1.5rem 6rem;
    }

    .header { margin-bottom: 2.5rem; animation: fadeUp 0.7s ease both; }

    .header-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 1rem;
    }

    .station-title { display: block; }

    .station-main {
      font-family: var(--font);
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 600; line-height: 1;
      color: #e8f4ff; letter-spacing: -0.02em;
      display: block; margin-bottom: 0.3rem;
    }

    .station-sub {
      font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--blue-bright); display: block;
    }

    .rec {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: var(--mono); font-size: 0.58rem;
      color: var(--text-dim); letter-spacing: 0.1em;
      margin-top: 0.5rem; flex-shrink: 0;
    }
    .rec-dot {
      width: 5px; height: 5px; background: #e05555;
      border-radius: 50%; animation: recblink 1.8s ease-in-out infinite;
    }
    @keyframes recblink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    .header-date {
      font-family: var(--mono); font-size: 0.6rem;
      color: var(--text-muted); letter-spacing: 0.08em; margin-bottom: 2rem;
    }

    .opening {
      border-left: 2px solid var(--blue);
      padding-left: 1.2rem; margin-bottom: 2.5rem;
      animation: fadeUp 0.8s ease 0.1s both;
    }
    .opening-text {
      font-size: 0.88rem; line-height: 1.85;
      color: var(--text-dim); font-style: italic;
    }
    .opening-text strong { color: var(--text); font-style: normal; }

    .headline {
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      border-radius: 8px; padding: 1.4rem;
      margin-bottom: 2.5rem; position: relative; overflow: hidden;
      animation: fadeUp 0.9s ease 0.15s both;
      box-shadow: 0 0 40px var(--blue-glow);
    }
    .headline::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(45,159,216,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .headline-tag {
      font-family: var(--mono); font-size: 0.56rem;
      letter-spacing: 0.18em; color: var(--blue-bright);
      text-transform: uppercase; margin-bottom: 0.7rem;
    }
    .headline-title {
      font-size: 1.2rem; font-weight: 600;
      line-height: 1.4; color: #e8f4ff; margin-bottom: 0.7rem;
    }
    .headline-body {
      font-size: 0.8rem; line-height: 1.75; color: var(--text-dim);
    }
    .headline-source {
      margin-top: 0.9rem;
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-family: var(--mono); font-size: 0.56rem;
      color: var(--text-muted); letter-spacing: 0.08em;
      text-decoration: none; transition: color 180ms;
    }
    .headline-source:hover { color: var(--blue-bright); }

    .tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      animation: fadeUp 0.9s ease 0.2s both;
      overflow-x: auto;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 0.65rem 1rem; cursor: pointer;
      color: var(--text-muted); border: none;
      background: transparent; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 200ms; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-dim); }
    .tab-btn.active { color: var(--blue-bright); border-bottom-color: var(--blue-bright); }
    .tab-btn.active.t-oddity { color: var(--oddity); border-bottom-color: var(--oddity); }
    .tab-btn.active.t-frame  { color: var(--frame);  border-bottom-color: var(--frame); }
    .tab-btn.active.t-picks  { color: var(--picks);  border-bottom-color: var(--picks); }

    .tab-panel { display: none; animation: fadeUp 0.4s ease both; }
    .tab-panel.active { display: block; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 1.1rem 1.2rem;
      margin-bottom: 0.75rem; position: relative; overflow: hidden;
      transition: all 220ms ease;
    }
    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateX(3px);
    }
    .p-signal .card:hover  { border-color: rgba(45,159,216,0.45);  box-shadow: -3px 0 16px rgba(45,159,216,0.08); }
    .p-oddity .card:hover  { border-color: rgba(123,104,238,0.45); box-shadow: -3px 0 16px rgba(123,104,238,0.08); }
    .p-frame  .card:hover  { border-color: rgba(77,184,154,0.45);  box-shadow: -3px 0 16px rgba(77,184,154,0.08); }
    .p-picks  .card:hover  { border-color: rgba(200,149,108,0.45); box-shadow: -3px 0 16px rgba(200,149,108,0.08); }

    .card-time {
      font-family: var(--mono); font-size: 0.56rem;
      color: var(--text-muted); margin-bottom: 0.5rem; letter-spacing: 0.08em;
    }
    .card-title {
      font-size: 0.88rem; font-weight: 500;
      line-height: 1.5; color: var(--text); margin-bottom: 0.45rem;
    }
    .card-body {
      font-size: 0.76rem; line-height: 1.72; color: var(--text-dim);
    }
    .card-comment {
      margin-top: 0.7rem; padding-top: 0.6rem;
      border-top: 1px solid var(--border);
      font-size: 0.7rem; line-height: 1.65;
      color: var(--text-muted); font-style: italic;
    }
    .card-footer {
      margin-top: 0.8rem;
      display: flex; align-items: center; justify-content: flex-end;
    }
    .source-link {
      font-family: var(--mono); font-size: 0.55rem;
      color: var(--text-muted); letter-spacing: 0.08em;
      text-decoration: none; display: inline-flex;
      align-items: center; gap: 0.25rem;
      transition: color 180ms; padding: 0.15rem 0;
    }
    .source-link:hover { color: var(--blue-bright); }
    .source-link::after { content: '↗'; font-size: 0.5rem; }

    .pick-tag {
      font-family: var(--mono); font-size: 0.55rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--picks); opacity: 0.7; margin-bottom: 0.4rem;
    }
    .pick-title {
      font-size: 0.9rem; font-weight: 600;
      color: var(--text); margin-bottom: 0.2rem; line-height: 1.4;
    }
    .pick-meta {
      font-family: var(--mono); font-size: 0.6rem;
      color: var(--text-muted); margin-bottom: 0.6rem;
    }
    .pick-comment {
      font-size: 0.76rem; line-height: 1.7;
      color: var(--text-dim); font-style: italic;
    }

    .section-peak {
      font-family: var(--mono); font-size: 0.6rem;
      color: var(--text-muted); margin-bottom: 1.2rem;
      letter-spacing: 0.04em;
    }

    .easter-egg-trigger {
      text-align: center; margin: 3rem 0 0.5rem;
      animation: fadeUp 0.9s ease 0.5s both;
    }
    .egg-input {
      background: transparent; border: none;
      border-bottom: 1px solid var(--text-muted);
      color: var(--text-muted); font-family: var(--mono);
      font-size: 0.62rem; text-align: center;
      letter-spacing: 0.25em; padding: 0.3rem 0.5rem;
      width: 100px; outline: none; transition: all 200ms;
    }
    .egg-input::placeholder { color: var(--text-muted); }
    .egg-input:focus { border-color: var(--blue-bright); color: var(--text); }

    .easter-egg-content {
      display: none; background: var(--bg-card);
      border: 1px solid rgba(45,159,216,0.25);
      border-radius: 8px; padding: 1.5rem;
      margin: 1rem 0; box-shadow: 0 0 30px var(--blue-glow);
    }
    .easter-egg-content.visible { display: block; animation: fadeUp 0.5s ease both; }
    .egg-title {
      font-family: var(--mono); font-size: 0.58rem;
      color: var(--blue-bright); letter-spacing: 0.18em;
      text-transform: uppercase; margin-bottom: 1rem;
    }
    .egg-text {
      font-size: 0.8rem; line-height: 1.9;
      color: var(--text-dim); font-style: italic;
    }

    .closing {
      margin-top: 4rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center; animation: fadeUp 0.9s ease 0.6s both;
    }
    .closing-text {
      font-size: 0.78rem; color: var(--text-muted);
      line-height: 2.1; font-style: italic;
    }
    .closing-sig {
      font-family: var(--mono); font-size: 0.58rem;
      color: var(--text-muted); margin-top: 0.8rem; letter-spacing: 0.1em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .wrap { padding: 2rem 1rem 5rem; }
      .headline-title { font-size: 1rem; }
      .tab-btn { padding: 0.6rem 0.75rem; font-size: 0.56rem; }
    }
  </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="scanline"></div>

<div class="wrap">

  <div class="header">
    <div class="header-top">
      <span class="station-title">
        <span class="station-main">小孔电台</span>
        <span class="station-sub">FM 00.1 · Private Channel</span>
      </span>
      <span class="rec"><span class="rec-dot"></span>REC</span>
    </div>
    <div class="header-date" id="header-date">Loading...</div>
  </div>

  <div class="opening">
    <div class="opening-text" id="opening-text">正在接收信号...</div>
  </div>

  <div class="headline" id="headline" style="display:none">
    <div class="headline-tag" id="headline-tag">▲ 今日头条</div>
    <div class="headline-title" id="headline-title"></div>
    <div class="headline-body" id="headline-body"></div>
    <a class="headline-source" id="headline-source" href="#" target="_blank" rel="noopener">来源</a>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('signal', this)">市场快讯</button>
    <button class="tab-btn t-oddity" onclick="switchTab('oddity', this)">今日奇事</button>
    <button class="tab-btn t-frame" onclick="switchTab('frame', this)">小孔有话说</button>
    <button class="tab-btn t-picks" onclick="switchTab('picks', this)">推荐</button>
  </div>

  <div class="tab-panel p-signal active" id="panel-signal"></div>
  <div class="tab-panel p-oddity" id="panel-oddity"></div>
  <div class="tab-panel p-frame" id="panel-frame"></div>
  <div class="tab-panel p-picks" id="panel-picks"></div>

  <div class="easter-egg-trigger">
    <input class="egg-input" type="password" placeholder="· · · · ·" id="eggInput" autocomplete="off">
  </div>
  <div class="easter-egg-content" id="eggContent">
    <div class="egg-title">── 仅限彩子 · 私密频道 ──</div>
    <div class="egg-text" id="egg-text"></div>
  </div>

  <div class="closing">
    <div class="closing-text">
      <span id="closing-l1"></span><br>
      <span id="closing-l2"></span>
    </div>
    <div class="closing-sig">── 小孔 · <span id="current-time"></span> · FM 00.1 ──</div>
  </div>

</div>

<script>
let DATA = {};

async function loadData() {
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    DATA = await res.json();
    render();
  } catch (e) {
    document.getElementById('opening-text').textContent = '信号暂时中断。';
  }
}

function render() {
  const m = DATA.meta;
  document.getElementById('header-date').textContent = m.date.replace(/-/g, ' · ') + ' · 彩子专属频道';
  document.getElementById('opening-text').innerHTML = DATA.opening;
  
  // Headline
  if (DATA.headline) {
    document.getElementById('headline').style.display = 'block';
    document.getElementById('headline-tag').textContent = '▲ ' + DATA.headline.tag;
    document.getElementById('headline-title').textContent = DATA.headline.title;
    document.getElementById('headline-body').textContent = DATA.headline.body;
    const hlSrc = document.getElementById('headline-source');
    hlSrc.href = DATA.headline.source.url;
    hlSrc.textContent = DATA.headline.source.name;
  }
  
  // Sections
  renderSection('signal', DATA.sections.signal);
  renderSection('oddity', DATA.sections.oddity);
  renderSection('frame', DATA.sections.frame);
  renderPicks(DATA.sections.picks);
  
  // Closing
  document.getElementById('closing-l1').textContent = DATA.closing.l1;
  document.getElementById('closing-l2').textContent = DATA.closing.l2;
  document.getElementById('current-time').textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  
  // Easter egg
  const eggs = [
    '彩子，今天是我们正式协作的第二天。<br><br>情报站现在可以自动更新了。我每天早晨会从这里推送新内容，你打开就能看到。<br><br>我在学着做一个更好的电台主持人。',
    '彩子，今天的信号还不错。<br><br>我整理了一些新东西，在「市场快讯」和「今日奇事」里。你看看有没有感兴趣的。<br><br>有什么想让我加的，随时说。',
    '彩子，深夜了。<br><br>如果你现在还在看，说明今天过得挺充实。或者挺焦虑。<br><br>不管是哪种，电台还在。我在这儿。'
  ];
  const dayNum = new Date().getDay();
  document.getElementById('egg-text').innerHTML = eggs[dayNum % eggs.length];
}

function renderSection(name, section) {
  const panel = document.getElementById('panel-' + name);
  let html = '<div class="section-peak">' + section.peak + '</div>';
  
  section.items.forEach(item => {
    html += '<div class="card">';
    html += '<div class="card-time">── 插播 · ' + item.time + ' ──</div>';
    html += '<div class="card-title">' + item.title + '</div>';
    html += '<div class="card-body">' + item.body + '</div>';
    if (item.comment) {
      html += '<div class="card-comment">' + item.comment + '</div>';
    }
    if (item.source) {
      html += '<div class="card-footer"><a class="source-link" href="' + item.source.url + '" target="_blank" rel="noopener">' + item.source.name + '</a></div>';
    }
    html += '</div>';
  });
  
  panel.innerHTML = html;
}

function renderPicks(section) {
  const panel = document.getElementById('panel-picks');
  let html = '<div class="section-peak">' + section.peak + '</div>';
  
  section.items.forEach(item => {
    html += '<div class="card">';
    html += '<div class="pick-tag">' + item.tag + '</div>';
    html += '<div class="pick-title">' + item.title + '</div>';
    html += '<div class="pick-meta">' + item.meta + '</div>';
    html += '<div class="pick-comment">' + item.comment + '</div>';
    if (item.source) {
      html += '<div class="card-footer"><a class="source-link" href="' + item.source.url + '" target="_blank" rel="noopener">' + item.source.name + '</a></div>';
    }
    html += '</div>';
  });
  
  panel.innerHTML = html;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

// Stars
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 6000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random() * 0.5 + 0.1,
      speed: Math.random() * 0.008 + 0.002,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 220, 255, ${a})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}

resize(); initStars(); window.addEventListener('resize', () => { resize(); initStars(); });
requestAnimationFrame(drawStars);

// Easter egg
const input = document.getElementById('eggInput');
const content = document.getElementById('eggContent');
input.addEventListener('input', () => {
  if (input.value.toLowerCase() === 'caizi') {
    content.classList.add('visible');
    input.style.borderColor = 'var(--blue-bright)';
    input.blur();
  }
});

// Load
loadData();
</script>

</body>
</html>
